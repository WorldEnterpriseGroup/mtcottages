name: CI / GitHub Pages CD

on:
  pull_request:
  push:
    branches:
      - gh-pages
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mtcottages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate source files and public boundaries
        run: |
          git diff --check
          for json_file in infra/azure/*.json; do jq empty "$json_file"; done
          python3 -m py_compile scripts/rebuild-hotelhub-pages.py infra/azure/apply-proxy/function_app.py
          python3 - <<'PY'
          from pathlib import Path

          errors = []
          pages = sorted(Path(".").glob("*.html"))
          if Path("CNAME").read_text(encoding="utf-8").strip() != "mtcottages.com":
              errors.append("CNAME must remain mtcottages.com")
          if not Path(".nojekyll").is_file():
              errors.append(".nojekyll is missing")
          for page in pages:
              markup = page.read_text(encoding="utf-8")
              if "assets/css/style.css" not in markup:
                  errors.append(f"{page} is missing the HotelHub stylesheet")
              if "255 Court St" in markup:
                  errors.append(f"{page} contains private/non-public inventory")
          # Verify all referenced cottage images exist on disk
          for page in pages:
              for match in __import__("re").finditer(r'assets/images/cottages/([^/"\']+(?:/[^"\')\s]+)?)', page.read_text()):
                  img_path = Path(match.group(0))
                  if not img_path.is_file():
                      errors.append(f"{page} references missing image: {match.group(0)}")
          if errors:
              raise SystemExit("\n".join(errors))
          print(f"Validated {len(pages)} HotelHub HTML pages")
          PY

      - name: Guard against committed street addresses
        run: |
          # Broader backstop for the *.html-only check above: scan every
          # tracked file for the banned addresses and the general
          # house-number+street pattern, so a leak into _data/*.json,
          # scripts/, or any other file fails the build too. Docs/tests
          # that describe or assert the rule (and legitimately name the
          # banned strings) are excluded.
          if git ls-files \
              | grep -vE '^(\.github/|\.claude/|e2e/|CLAUDE\.md$|agents\.md$|claude\.md$)' \
              | xargs -r grep -InE '255 Court|216 Sand|287 Ridgeway|[0-9]+ (Court|Sand|Broad|45th|32nd|Frederick|Walnut|Virginia|Henrietta|Gallatin|Ridgeway)'; then
            echo "ERROR: banned street address pattern found in a tracked file (see matches above)"
            exit 1
          fi
          echo "No banned street address patterns found in tracked content/data files."

      - name: Check application form parity
        run: |
          python3 -m py_compile scripts/check-form-parity.py
          python3 scripts/check-form-parity.py

  e2e-local:
    name: Local browser E2E
    needs: static-checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install browser test dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Chromium
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Start the local site
        run: |
          nohup python3 -m http.server 4173 --bind 127.0.0.1 >/tmp/mtcottages-http.log 2>&1 &
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:4173/index.html >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/mtcottages-http.log
          exit 1

      - name: Run local browser tests
        working-directory: e2e
        env:
          BASE_URL: http://127.0.0.1:4173
        run: npx playwright test tests/site.spec.js

      - name: Upload local Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mtcottages-local-playwright-report
          path: e2e/playwright-report
          if-no-files-found: ignore

  live-smoke:
    name: Live smoke after gh-pages publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/gh-pages'
    needs: e2e-local
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install browser test dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Chromium
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Verify the published application edge
        working-directory: e2e
        env:
          BASE_URL: https://stay.mtcottages.com
          LIVE_SMOKE: "1"
        run: npx playwright test tests/live.spec.js

      - name: Upload live Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mtcottages-live-playwright-report
          path: e2e/playwright-report
          if-no-files-found: ignore
